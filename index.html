<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GridTanker — Admin Portal</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><rect x='2' y='2' width='20' height='20' rx='5' fill='%23111' stroke='%235DCAA5' stroke-width='1.4'/><path d='M6 16L10 7L14 13L18 5' stroke='%235DCAA5' stroke-width='1.8' fill='none' stroke-linecap='round'/></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }

:root {
  --tx: #1a1a1a; --tx2: #6b6b6b; --tx3: #a0a0a0;
  --brd: #e8e7e4;
  --cbg: #ffffff; --cbg2: #f0efed; --cbg3: #f5f5f3;
  --acc: #1D9E75; --accl: #e8f5ef; --accd: #0F6E56;
  --warn: #d4880a; --warnl: #faf0da;
  --alr: #c93c3c; --alrl: #fce8e8;
  --r: 14px; --rs: 10px; --pill: 20px;
}

body { background: var(--cbg3); min-height: 100vh; }

.shell { display:flex; min-height:100vh; background:var(--cbg3); }

/* ── SIDEBAR ── */
.sb { width:230px; background:#111; display:flex; flex-direction:column; flex-shrink:0; position:fixed; top:0; left:0; bottom:0; z-index:50; }
.sb .logo { padding:20px 16px 16px; display:flex; align-items:center; gap:10px; border-bottom:1px solid #333; }
.sb .logo svg { width:26px; height:26px; }
.sb .logo b { font-size:14px; font-weight:600; color:#fff; }
.sb .logo small { font-size:8px; color:var(--acc); background:rgba(29,158,117,.15); padding:2px 7px; border-radius:var(--pill); margin-left:auto; font-weight:600; }
.lang { display:flex; gap:3px; padding:10px 14px 4px; }
.lang span { font-size:10px; padding:3px 7px; border-radius:var(--pill); cursor:pointer; color:#777; font-weight:500; transition:.15s; }
.lang span:hover { color:#bbb; }
.lang span.on { background:rgba(29,158,117,.2); color:var(--acc); }
.wss { padding:6px 14px 4px; }
.wss select { width:100%; background:#222; border:1px solid #444; color:#eee; font-size:12px; padding:8px 10px; border-radius:var(--rs); appearance:none; cursor:pointer; font-weight:500; font-family:inherit; background-image:url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 8 5' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L4 4L7 1' stroke='%2399f5d5' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E"); background-repeat:no-repeat; background-position:right 10px center; }
.wsl { font-size:9px; text-transform:uppercase; letter-spacing:.8px; color:#777; padding:0 4px 3px; display:block; font-weight:600; }
.ni { display:flex; align-items:center; gap:9px; padding:9px 14px; margin:1px 8px; border-radius:var(--rs); font-size:12px; cursor:pointer; transition:.15s; color:#999; font-weight:500; }
.ni:hover { background:#222; color:#ddd; }
.ni.on { background:rgba(29,158,117,.15); color:var(--acc); }
.ni svg { width:16px; height:16px; opacity:.6; flex-shrink:0; }
.ni.on svg { opacity:1; }
.nbg { margin-left:auto; font-size:8px; background:var(--warn); color:#fff; padding:2px 6px; border-radius:var(--pill); font-weight:600; }
.sf { margin-top:auto; padding:12px 14px; border-top:1px solid #333; }
.up { display:flex; align-items:center; gap:8px; }
.up .ava { width:32px; height:32px; border-radius:50%; background:var(--acc); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:#fff; }
.up .un { font-size:11px; color:#fff; font-weight:500; }
.up .ur { font-size:9px; color:#777; }

/* ── MAIN ── */
.mn { flex:1; display:flex; flex-direction:column; min-width:0; margin-left:230px; }
.topb { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; background:var(--cbg); border-bottom:1px solid var(--brd); position:sticky; top:0; z-index:30; }
.topb h1 { font-size:16px; font-weight:600; color:var(--tx); }
.ct { flex:1; padding:18px 24px; overflow-y:auto; }

/* ── COMPONENTS ── */
.btn { font-size:10px; padding:7px 14px; border-radius:var(--rs); border:1px solid var(--brd); background:var(--cbg); cursor:pointer; color:var(--tx2); font-weight:500; display:inline-flex; align-items:center; gap:4px; font-family:inherit; transition:.15s; }
.btn:hover { background:var(--cbg2); }
.btn.pr { background:#111; color:#fff; border-color:#111; }
.btn.pr:hover { background:#222; }
.btn.acc { background:var(--acc); color:#fff; border-color:var(--acc); }
.btn.acc:hover { background:var(--accd); }

.mets { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin-bottom:16px; }
.mc { background:var(--cbg); border-radius:var(--r); padding:16px; border:1px solid var(--brd); transition:.15s; }
.mc:hover { border-color:var(--acc); }
.mc .ml { font-size:9px; color:var(--tx3); margin-bottom:3px; text-transform:uppercase; letter-spacing:.5px; font-weight:600; }
.mc .mv { font-size:22px; font-weight:600; color:var(--tx); letter-spacing:-.4px; }
.mc .ms { font-size:9px; margin-top:3px; font-weight:500; color:var(--accd); }

.fp { background:var(--cbg); border-radius:var(--r); border:1px solid var(--brd); padding:18px; margin-bottom:12px; }
.fh { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.fh h2 { font-size:13px; font-weight:600; color:var(--tx); }
.phl { font-size:9px; color:var(--acc); cursor:pointer; font-weight:500; }

.pill { font-size:9px; padding:3px 10px; border-radius:var(--pill); font-weight:600; display:inline-flex; align-items:center; }
.p-on { background:var(--accl); color:var(--accd); }
.p-mnt { background:var(--warnl); color:var(--warn); }
.p-flt { background:var(--alrl); color:var(--alr); }
.p-pnd { background:var(--cbg2); color:var(--tx2); }
.p-dk { background:#111; color:#fff; }

.hidden { display:none !important; }

/* Site cards */
.sc { background:var(--cbg); border:1px solid var(--brd); border-radius:var(--r); margin-bottom:10px; overflow:hidden; transition:.15s; }
.sc:hover { border-color: rgba(29,158,117,.3); }
.shd { display:flex; align-items:center; justify-content:space-between; padding:16px 18px; cursor:pointer; transition:.1s; }
.shd:hover { background:var(--cbg2); }
.shd .sn { font-size:13px; font-weight:600; color:var(--tx); }
.shd .sloc { font-size:10px; color:var(--tx2); }
.shd .sr { display:flex; align-items:center; gap:10px; font-size:11px; }
.shd .arr { font-size:16px; color:var(--tx3); }
.sa { border-top:1px solid var(--brd); padding:14px 18px; }

/* Asset rows */
.ar { display:flex; align-items:center; gap:9px; padding:10px 14px; border-radius:var(--rs); cursor:pointer; margin-bottom:4px; background:var(--cbg2); transition:.12s; }
.ar:hover { background:var(--cbg3); transform:translateX(2px); }

/* Overlays */
.asset-view { position:fixed; top:0; right:0; bottom:0; left:230px; background:var(--cbg3); z-index:40; padding:18px 24px; overflow-y:auto; }
.wizard-overlay { position:fixed; top:0; right:0; bottom:0; left:230px; background:var(--cbg); z-index:45; overflow-y:auto; }

/* Forms */
.wf { margin-bottom:14px; }
.wf label { font-size:9px; color:var(--tx3); display:block; margin-bottom:3px; text-transform:uppercase; letter-spacing:.4px; font-weight:600; }
.wf input, .wf select { width:100%; font-size:12px; padding:9px 12px; border-radius:var(--rs); border:1px solid var(--brd); background:var(--cbg); color:var(--tx); font-weight:500; font-family:inherit; transition:.15s; }
.wf input:focus, .wf select:focus { outline:none; border-color:var(--acc); }

/* Tables */
table.dt { width:100%; border-collapse:collapse; font-size:11px; color:var(--tx); }
table.dt th { text-align:left; font-weight:600; color:var(--tx3); padding:8px 4px; border-bottom:1px solid var(--brd); font-size:9px; text-transform:uppercase; letter-spacing:.3px; }
table.dt td { padding:10px 4px; border-bottom:1px solid var(--brd); color:var(--tx); }
table.dt tr:last-child td { border-bottom:none; }
table.dt tr:hover td { background:var(--cbg2); }

.gf-row { display:flex; justify-content:space-between; padding:4px 0; font-size:11px; }
.gf-row .gfl { color:var(--tx2); }
.gf-row .gfv { font-weight:600; color:var(--tx); }

/* Earnings */
.earn-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(90px,1fr)); gap:8px; margin-bottom:12px; }
.earn-card { background:var(--cbg2); border-radius:8px; padding:12px 10px; text-align:center; transition:.15s; }
.earn-card:hover { background:var(--cbg3); }
.earn-card .ec-label { font-size:8px; color:var(--tx3); text-transform:uppercase; letter-spacing:.4px; font-weight:600; margin-bottom:3px; }
.earn-card .ec-val { font-size:13px; font-weight:600; color:var(--tx); }

.po-row { display:flex; align-items:center; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--brd); font-size:11px; }
.po-row:last-child { border-bottom:none; }
.po-row .po-left { display:flex; align-items:center; gap:7px; }
.po-row .po-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.po-row .po-name { color:var(--tx); font-weight:500; }
.po-pos { color:var(--accd); }
.po-neg { color:var(--alr); }

/* Energy flow */
.ef-price { display:flex; justify-content:center; gap:18px; margin-top:10px; padding:8px 16px; background:var(--cbg2); border-radius:8px; font-size:11px; font-weight:600; color:var(--tx); }
.ef-price span { color:var(--tx2); font-weight:500; }

/* Gear button */
.gear-btn { width:30px; height:30px; border-radius:7px; border:1px solid var(--brd); background:var(--cbg); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:.15s; }
.gear-btn:hover { background:var(--cbg2); border-color:var(--tx3); }

/* Partner card */
.partner-card { border:1px solid var(--brd); border-radius:var(--rs); padding:14px; display:flex; align-items:center; gap:12px; margin-bottom:10px; }
.partner-card .pc-logo { width:44px; height:44px; border-radius:10px; background:var(--cbg2); display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; color:var(--acc); flex-shrink:0; }
.partner-card .pc-name { font-size:13px; font-weight:600; color:var(--tx); }
.partner-card .pc-desc { font-size:10px; color:var(--tx2); }

.site-chip { display:inline-flex; align-items:center; padding:5px 14px; border-radius:var(--pill); font-size:10px; font-weight:600; cursor:pointer; border:1.5px solid var(--brd); background:var(--cbg); color:var(--tx2); margin-right:4px; margin-bottom:4px; transition:.15s; }
.site-chip:hover { border-color:var(--tx); color:var(--tx); }
.site-chip.on { background:#111; color:#fff; border-color:#111; }

.actions-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }

.time-sel { display:flex; gap:0; background:var(--cbg2); border-radius:8px; padding:2px; border:1px solid var(--brd); }
.time-sel span { font-size:10px; padding:5px 12px; border-radius:6px; cursor:pointer; font-weight:600; color:var(--tx3); transition:.15s; }
.time-sel span:hover { color:var(--tx2); }
.time-sel span.on { background:var(--cbg); color:var(--tx); border:1px solid var(--brd); box-shadow:0 1px 3px rgba(0,0,0,.06); }

.be-box { background:var(--accl); border-radius:var(--rs); padding:12px; margin-top:10px; border:1px solid rgba(29,158,117,.2); }

/* Animated icons */
.anim-icon { width:32px; height:32px; display:flex; align-items:center; justify-content:center; flex-shrink:0; border-radius:8px; overflow:hidden; }
.anim-icon.sm { width:24px; height:24px; border-radius:6px; }
.anim-icon.xs { width:18px; height:18px; border-radius:4px; }
.anim-icon.lg { width:44px; height:44px; border-radius:10px; }

@keyframes shake { 0%,100%{transform:translate(0,0)} 25%{transform:translate(-.4px,.2px)} 75%{transform:translate(.4px,-.2px)} }
@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }
@keyframes pulse-glow { 0%,100%{opacity:.5} 50%{opacity:1} }
@keyframes charge-flow { 0%{opacity:.2} 50%{opacity:1} 100%{opacity:.2} }
@keyframes idle-breathe { 0%,100%{opacity:.3} 50%{opacity:.55} }
.genset-on .gen-body { animation:shake .15s infinite; }
.wind-on .wind-blade { animation:spin 1.2s linear infinite; transform-origin:center; }
.solar-on .sun-glow { animation:pulse-glow 2s ease-in-out infinite; }
.bat-on .charge-bar { animation:charge-flow 1.5s ease-in-out infinite; }
.crypto-on .cr-hash { animation:pulse-glow 1s ease-in-out infinite; }
.grid-on .grid-pulse { animation:pulse-glow 2.5s ease-in-out infinite; }
.asset-idle .idle-el { animation:idle-breathe 3s ease-in-out infinite; }

/* Responsive */
@media (max-width: 900px) {
  .sb { width:60px; }
  .sb .logo b, .sb .logo small, .wss, .wsl, .lang, .ni span, .ni .nbg, .up .un, .up .ur { display:none; }
  .ni { justify-content:center; padding:10px; margin:2px 4px; }
  .mn { margin-left:60px; }
  .asset-view, .wizard-overlay { left:60px; }
  .mets { grid-template-columns:repeat(2,1fr); }
}
canvas { cursor:default; }
</style>
</head>
<body>

<div class="shell">
<div class="sb">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="#5DCAA5" stroke-width="1.4"/><path d="M6 16L10 7L14 13L18 5" stroke="#5DCAA5" stroke-width="1.8" fill="none" stroke-linecap="round"/><circle cx="18" cy="5" r="1.5" fill="#5DCAA5"/></svg>
    <b>GridTanker</b><small>MVP</small>
  </div>
  <div class="lang" id="lang">
    <span class="on" data-l="en">EN</span>
    <span data-l="et">ET</span>
    <span data-l="ru">RU</span>
  </div>
  <div class="wss">
    <span class="wsl">Workspace</span>
    <select id="ws-sel"></select>
  </div>
  <div style="padding:2px 14px 6px"><button class="btn" style="width:100%;justify-content:center;font-size:9px;padding:5px 8px;background:#222;color:#999;border-color:#333" onclick="showAddWS()">+ Add workspace</button></div>
  <div style="padding:4px 0" id="nav-list"></div>
  <div class="sf">
    <div class="up">
      <div class="ava">SV</div>
      <div>
        <div class="un">Sander Vahtras</div>
        <div class="ur">Admin</div>
      </div>
    </div>
  </div>
</div>

<div class="mn">
  <div class="topb"><h1 id="pt">Dashboard</h1></div>
  <div style="position:relative;flex:1;display:flex;flex-direction:column">
    <div class="ct" id="ct"></div>
    <div class="wizard-overlay hidden" id="wiz"></div>
    <div class="asset-view hidden" id="av"></div>
  </div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ══════════════════════════════════════════════
// GridTanker Admin Portal — Deployable Build
// ══════════════════════════════════════════════

const G='#0F6E56', GL='#1D9E75', GLL='#e8f5ef';
const tCol = { genset:G, battery:GL, solar:'#5DCAA5', wind:'#085041', crypto:'#04342C', hydro:'#2471a3', grid:'#3a7bd5', building:'#e67e22' };

// ── Asset Icon Builder ──
function AI(tp, act, sz='') {
  const s = sz==='lg'?44:sz==='sm'?24:sz==='xs'?18:32;
  const cls = sz ? ` ${sz}` : '';
  const on = act;
  const bg = on ? (tp==='grid'?'rgba(58,123,213,.12)':tp==='building'?'rgba(230,126,34,.12)':tp==='hydro'?'rgba(36,113,163,.12)':GLL) : 'var(--cbg2)';
  const onC = on ? ({genset:'genset-on',wind:'wind-on',solar:'solar-on',battery:'bat-on',crypto:'crypto-on',hydro:'wind-on',grid:'grid-on',building:'asset-idle'}[tp]||'') : 'asset-idle';
  const ic = {
    genset:`<g class="${on?'gen-body':'idle-el'}"><rect x="4" y="8" width="24" height="16" rx="3" stroke="${G}" stroke-width="2" fill="${on?'rgba(29,158,117,.1)':'none'}"/><rect x="8" y="12" width="3" height="8" rx="1" fill="${GL}"/><rect x="14" y="10" width="3" height="12" rx="1" fill="${GL}"/><rect x="20" y="12" width="3" height="8" rx="1" fill="${GL}"/></g>`,
    wind:`<line x1="16" y1="16" x2="16" y2="30" stroke="${G}" stroke-width="2.5"/><g class="${on?'wind-blade':'idle-el'}" style="transform-origin:16px 14px"><line x1="16" y1="14" x2="16" y2="3" stroke="${GL}" stroke-width="2.5"/><line x1="16" y1="14" x2="6" y2="20" stroke="${GL}" stroke-width="2.5"/><line x1="16" y1="14" x2="26" y2="20" stroke="${GL}" stroke-width="2.5"/></g><circle cx="16" cy="14" r="2.5" fill="${G}"/>`,
    solar:`<rect x="4" y="10" width="24" height="16" rx="2" stroke="${G}" stroke-width="2"/><line x1="4" y1="18" x2="28" y2="18" stroke="${G}" stroke-width="1"/><line x1="12" y1="10" x2="12" y2="26" stroke="${G}" stroke-width="1"/>${on?`<g class="sun-glow"><circle cx="26" cy="6" r="3" fill="${GL}"/></g>`:''}`,
    battery:`<rect x="4" y="9" width="22" height="14" rx="3" stroke="${G}" stroke-width="2"/><rect x="26" y="13" width="3" height="6" rx="1" fill="${G}" opacity=".5"/><rect x="7" y="12" width="5" height="8" rx="1.5" fill="${GL}" class="${on?'charge-bar':'idle-el'}"/>`,
    crypto:`<rect x="4" y="4" width="24" height="24" rx="4" stroke="${G}" stroke-width="2"/><text x="16" y="20" text-anchor="middle" font-size="14" font-weight="700" fill="${GL}" class="${on?'cr-hash':'idle-el'}">#</text>`,
    hydro:`<g class="${on?'wind-blade':'idle-el'}" style="transform-origin:16px 16px"><path d="M16 4c-4 6-8 10-8 14a8 8 0 0016 0c0-4-4-8-8-14z" fill="none" stroke="#2471a3" stroke-width="2"/>${on?'<path d="M12 18c1-2 3-3 5-1s3 1 4-1" stroke="#2471a3" stroke-width="1.5" fill="none"/>':''}</g>`,
    building:`<g class="idle-el"><path d="M6 26h20v-14l-10-6-10 6z" fill="none" stroke="#e67e22" stroke-width="2"/><rect x="12" y="18" width="8" height="8" rx="1" fill="#e67e22" opacity=".3"/></g>`,
    grid:`<g class="${on?'grid-pulse':'idle-el'}"><line x1="16" y1="4" x2="16" y2="14" stroke="#3a7bd5" stroke-width="2.5"/><line x1="10" y1="14" x2="22" y2="14" stroke="#3a7bd5" stroke-width="2"/><line x1="11" y1="14" x2="8" y2="22" stroke="#3a7bd5" stroke-width="1.8"/><line x1="16" y1="14" x2="16" y2="22" stroke="#3a7bd5" stroke-width="1.8"/><line x1="21" y1="14" x2="24" y2="22" stroke="#3a7bd5" stroke-width="1.8"/><line x1="8" y1="22" x2="24" y2="22" stroke="#3a7bd5" stroke-width="1.5"/><line x1="10" y1="22" x2="7" y2="28" stroke="#3a7bd5" stroke-width="1.5"/><line x1="16" y1="22" x2="16" y2="28" stroke="#3a7bd5" stroke-width="1.5"/><line x1="22" y1="22" x2="25" y2="28" stroke="#3a7bd5" stroke-width="1.5"/></g>`
  };
  return `<div class="anim-icon${cls} ${onC}" style="background:${bg}"><svg width="${s*.55}" height="${s*.55}" viewBox="0 0 32 32" fill="none">${ic[tp]||ic.genset}</svg></div>`;
}

function P(s) { const m={online:'p-on',dispatching:'p-on',maintenance:'p-mnt',fault:'p-flt',pending:'p-pnd'}; return `<span class="pill ${m[s]||'p-pnd'}">${s}</span>`; }
function ss(s) { const t=s.assets.map(a=>a.status); if(t.includes('fault'))return'fault'; if(t.includes('dispatching'))return'dispatching'; if(t.every(x=>x==='pending'))return'pending'; if(t.includes('maintenance'))return'maintenance'; return'operational'; }
function isAc(s) { return ['online','dispatching'].includes(s); }

// ── SVG Arc helper ──
function svgArc(acx,acy,r,startDeg,endDeg){
  const s=startDeg*Math.PI/180,e=endDeg*Math.PI/180;
  const x1=acx+r*Math.cos(s),y1=acy+r*Math.sin(s),x2=acx+r*Math.cos(e),y2=acy+r*Math.sin(e);
  const large=Math.abs(endDeg-startDeg)>180?1:0;
  return`M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 ${large} 1 ${x2.toFixed(1)},${y2.toFixed(1)}`;
}
function drawGauge(gx,gy,r,current,maxA,voltage,label,col){
  const pct=Math.min(1,current/maxA);
  const startA=-220,endA=40,range=endA-startA,fillEnd=startA+range*pct,sw=r*.22;
  let g='';
  g+=`<path d="${svgArc(gx,gy,r,startA,endA)}" fill="none" stroke="rgba(128,128,128,.18)" stroke-width="${sw}" stroke-linecap="round"/>`;
  if(pct>0.005) g+=`<path d="${svgArc(gx,gy,r,startA,fillEnd)}" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round" opacity=".9"/>`;
  g+=`<text x="${gx}" y="${gy-r-3}" text-anchor="middle" font-size="${r*.42}" fill="${col}" font-weight="700">${label}</text>`;
  const fmtA=current>=100?Math.round(current)+'A':current.toFixed(1)+'A';
  g+=`<text x="${gx}" y="${gy+1}" text-anchor="middle" font-size="${r*.48}" fill="${col}" font-weight="700">${fmtA}</text>`;
  g+=`<text x="${gx}" y="${gy+r*.4}" text-anchor="middle" font-size="${r*.38}" fill="#555" font-weight="600">${voltage}V</text>`;
  const fmtMax=maxA>=100?Math.round(maxA)+'A':maxA+'A';
  const zx=gx+r*1.08*Math.cos(startA*Math.PI/180),zy=gy+r*1.08*Math.sin(startA*Math.PI/180);
  const mx=gx+r*1.08*Math.cos(endA*Math.PI/180),my=gy+r*1.08*Math.sin(endA*Math.PI/180);
  g+=`<text x="${zx}" y="${zy+r*.25}" text-anchor="middle" font-size="${r*.26}" fill="#aaa">0</text>`;
  g+=`<text x="${mx}" y="${my+r*.25}" text-anchor="middle" font-size="${r*.26}" fill="#aaa">${fmtMax}</text>`;
  return g;
}

// ── Energy Flow Diagram ──
function buildEF(site) {
  const assets=site.assets, n=assets.length;
  if(!n) return '<div style="padding:40px;text-align:center;color:var(--tx3)">No assets connected</div>';
  const bLoad=site.buildingLoad||20;
  let totalProd=0, totalCons=bLoad;
  assets.forEach(a=>{if(!isAc(a.status))return; const kw=a.sessions[0]?.kwAvg||a.kw; if(a.type==='crypto')totalCons+=kw; else totalProd+=kw;});
  const netKw=totalProd-totalCons, exporting=netKw>0;
  const gc=site.gridConn||{consA:200,prodA:400};
  const bAmps=Math.round(bLoad*1000/3/230), bMaxA=Math.round(bLoad*1000/3/230*1.5);

  const nodes=[...assets.map(a=>({...a,isGrid:false,isBldg:false})),{id:'Building',type:'building',isGrid:false,isBldg:true,kw:bLoad,status:'online',sessions:[],ph:{a:[bAmps,bAmps,bAmps],v:[231,230,232],maxA:bMaxA}},{id:'GRID',type:'grid',isGrid:true,isBldg:false,kw:Math.abs(netKw),status:'online',sessions:[]}];
  const total=nodes.length;
  const detail=efDetail;

  // Layout: in detail mode, spread nodes wider to make room for gauge rings beside them
  const VW=detail?960:680, VH=detail?740:500;
  const cxH=VW/2, cyH=VH/2;
  const hRadius=detail?220:155, nodeR=28, hubR=42;
  const gaugeR=detail?26:0, gaugeSpacing=gaugeR*2.4;

  const pos=[];
  for(let i=0;i<total;i++){const ang=-Math.PI/2+(2*Math.PI*i/total);pos.push({x:cxH+Math.cos(ang)*hRadius,y:cyH+Math.sin(ang)*hRadius});}

  let svg=`<svg viewBox="0 0 ${VW} ${VH}" xmlns="http://www.w3.org/2000/svg" style="max-width:${VW}px;width:100%;margin:0 auto;display:block">`;
  svg+=`<defs>`;
  nodes.forEach((_,i)=>{
    svg+=`<path id="toH${site.id}${i}" d="M${pos[i].x},${pos[i].y} L${cxH},${cyH}"/>`;
    svg+=`<path id="frH${site.id}${i}" d="M${cxH},${cyH} L${pos[i].x},${pos[i].y}"/>`;
  });svg+=`</defs>`;

  // Lines
  nodes.forEach((_,i)=>{svg+=`<line x1="${cxH}" y1="${cyH}" x2="${pos[i].x}" y2="${pos[i].y}" stroke="rgba(128,128,128,.12)" stroke-width="2"/>`;});

  // Animated dots
  nodes.forEach((nd,i)=>{
    if(nd.isGrid){
      const pid=exporting?`toH${site.id}${i}`:`frH${site.id}${i}`;
      const dir=exporting?'keyPoints="1;0" keyTimes="0;1"':'';
      for(let d=0;d<3;d++){svg+=`<circle r="4.5" fill="#3a7bd5" opacity=".6"><animateMotion dur="${2+d*.25}s" begin="${d*.6}s" repeatCount="indefinite" ${dir}><mpath href="#${pid}"/></animateMotion></circle>`;}
    } else if(nd.isBldg){
      for(let d=0;d<2;d++){svg+=`<circle r="4" fill="#e67e22" opacity=".6"><animateMotion dur="${2+d*.3}s" begin="${d*.5}s" repeatCount="indefinite"><mpath href="#frH${site.id}${i}"/></animateMotion></circle>`;}
    } else if(isAc(nd.status)){
      const consuming=nd.type==='crypto';
      const pid=consuming?`frH${site.id}${i}`:`toH${site.id}${i}`;
      for(let d=0;d<3;d++){svg+=`<circle r="4.5" fill="${GL}" opacity=".7"><animateMotion dur="${1.5+d*.2}s" begin="${d*.5}s" repeatCount="indefinite"><mpath href="#${pid}"/></animateMotion></circle>`;}
    }
  });

  // Hub
  svg+=`<circle cx="${cxH}" cy="${cyH}" r="${hubR}" fill="#111"/>`;
  svg+=`<text x="${cxH}" y="${cyH-18}" text-anchor="middle" fill="#fff" font-size="10" font-weight="500">GT</text>`;
  svg+=`<text x="${cxH}" y="${cyH+3}" text-anchor="middle" fill="${exporting?'#5DCAA5':'#e67e22'}" font-size="17" font-weight="700">${exporting?'+':'-'}${Math.abs(netKw).toFixed(0)} kW</text>`;
  svg+=`<text x="${cxH}" y="${cyH+17}" text-anchor="middle" fill="rgba(255,255,255,.6)" font-size="9">${exporting?'→ Export':'← Import'}</text>`;
  svg+=`<text x="${cxH}" y="${cyH+29}" text-anchor="middle" fill="rgba(255,255,255,.4)" font-size="8">${gc.consA}A / ${gc.prodA}A</text>`;

  const nodeIcons={
    genset:'<rect x="-8" y="-6" width="16" height="12" rx="2" fill="none" stroke="#fff" stroke-width="1.6"/><line x1="-4" y1="-3" x2="-4" y2="3" stroke="#fff" stroke-width="1.3"/><line x1="0" y1="-4" x2="0" y2="4" stroke="#fff" stroke-width="1.3"/><line x1="4" y1="-3" x2="4" y2="3" stroke="#fff" stroke-width="1.3"/>',
    battery:'<rect x="-9" y="-5" width="15" height="10" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/><rect x="6" y="-2.5" width="3.5" height="5" rx="1" fill="#fff" opacity=".6"/>',
    solar:'<rect x="-9" y="-5" width="18" height="10" rx="1.5" fill="none" stroke="#fff" stroke-width="1.5"/><line x1="-9" y1="0" x2="9" y2="0" stroke="#fff" stroke-width=".8"/>',
    wind:'<line x1="0" y1="1" x2="0" y2="9" stroke="#fff" stroke-width="2.2"/><line x1="0" y1="-1" x2="0" y2="-9" stroke="#fff" stroke-width="2.2"/><line x1="0" y1="-1" x2="-7" y2="5" stroke="#fff" stroke-width="2.2"/><line x1="0" y1="-1" x2="7" y2="5" stroke="#fff" stroke-width="2.2"/>',
    crypto:'<text x="0" y="6" text-anchor="middle" font-size="20" font-weight="700" fill="#fff">#</text>',
    hydro:'<path d="M0 -8c-3 5-6 8-6 11a6 6 0 0012 0c0-3-3-6-6-11z" fill="none" stroke="#fff" stroke-width="1.6"/><path d="M-3 5c1-1.5 2.5-2 4-1s2.5.5 3-.5" stroke="#fff" stroke-width="1.2" fill="none"/>',
    building:'<path d="M-8 9h16v-14l-8-6-8 6z" fill="none" stroke="#fff" stroke-width="1.6"/><rect x="-2" y="1" width="4" height="8" rx=".5" fill="#fff" opacity=".5"/>',
    grid:'<line x1="0" y1="-9" x2="0" y2="-1" stroke="#fff" stroke-width="2.5"/><line x1="-7" y1="-1" x2="7" y2="-1" stroke="#fff" stroke-width="2"/><line x1="-6" y1="-1" x2="-8" y2="7" stroke="#fff" stroke-width="1.8"/><line x1="0" y1="-1" x2="0" y2="7" stroke="#fff" stroke-width="1.8"/><line x1="6" y1="-1" x2="8" y2="7" stroke="#fff" stroke-width="1.8"/><line x1="-8" y1="7" x2="8" y2="7" stroke="#fff" stroke-width="1.5"/>'
  };
  const phaseColors=['#c0392b','#27ae60','#2980b9'];

  nodes.forEach((nd,i)=>{
    const p=pos[i],on=nd.isGrid||nd.isBldg||isAc(nd.status);
    const col=nd.isGrid?'#3a7bd5':nd.isBldg?'#e67e22':(tCol[nd.type]||G);
    svg+=`<circle cx="${p.x}" cy="${p.y}" r="${nodeR}" fill="${on?col:'rgba(128,128,128,.25)'}"/>`;
    svg+=`<g transform="translate(${p.x},${p.y})">${nodeIcons[nd.type]||nodeIcons.genset}</g>`;

    // Determine label direction: use vector from hub to node
    const dx=p.x-cxH, dy=p.y-cyH;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    const ux=dx/dist, uy=dy/dist;
    // Place text along the outward direction, well away from icon
    const txtDist=nodeR+18;
    const tx=p.x+ux*txtDist, ty=p.y+uy*txtDist;
    // Text anchor based on direction
    const anchor=Math.abs(ux)<0.3?'middle':(ux>0?'start':'end');
    const tyOff=uy>0.3?14:(uy<-0.3?-4:4);

    if(nd.isGrid){
      svg+=`<text x="${tx}" y="${ty+tyOff-6}" text-anchor="${anchor}" font-size="14" fill="#3a7bd5" font-weight="700">${exporting?'Export':'Import'} ${Math.abs(netKw).toFixed(0)} kW</text>`;
      svg+=`<text x="${tx}" y="${ty+tyOff+9}" text-anchor="${anchor}" font-size="9" fill="#555">Grid — ${exporting?gc.prodA:gc.consA}A fuse</text>`;
    } else {
      const kw=on?(nd.isBldg?bLoad:(nd.sessions[0]?.kwAvg||nd.kw)):0;
      const consuming=nd.type==='crypto'||nd.isBldg;

      if(!detail || !nd.ph || !on){
        // Compact mode: text right next to icon
        svg+=`<text x="${tx}" y="${ty+tyOff-6}" text-anchor="${anchor}" font-size="14" fill="${col}" font-weight="700">${consuming?'-':''}${kw>=1000?(kw/1000).toFixed(1)+' MW':kw+' kW'}</text>`;
        svg+=`<text x="${tx}" y="${ty+tyOff+9}" text-anchor="${anchor}" font-size="10" fill="#333" font-weight="600">${nd.id}</text>`;
      } else {
        // Detail mode: text on opposite side from gauges
        // Gauges go outward, text goes between icon and hub (inward side)
        const itx=p.x-ux*(nodeR+6), ity=p.y-uy*(nodeR+6);
        const ianchor=Math.abs(ux)<0.3?'middle':(ux>0?'end':'start');
        const ityOff=uy>0.3?-8:(uy<-0.3?16:4);
        svg+=`<text x="${itx}" y="${ity+ityOff-6}" text-anchor="${ianchor}" font-size="13" fill="${col}" font-weight="700">${consuming?'-':''}${kw>=1000?(kw/1000).toFixed(1)+' MW':kw+' kW'}</text>`;
        svg+=`<text x="${itx}" y="${ity+ityOff+8}" text-anchor="${ianchor}" font-size="10" fill="#333" font-weight="600">${nd.id}</text>`;
      }
    }

    // Phase gauges in detail mode — horizontal row, pushed far out from icon
    if(detail && nd.ph && on && !nd.isGrid){
      const ph=nd.ph, maxA=ph.maxA;
      // Push gauge center far enough that gauge ring doesn't touch the icon
      // gaugeR=26, so gauge extends gaugeR back toward icon. Need gDist > nodeR + gaugeR + padding
      const gPad=16;
      const gDist=nodeR+gaugeR+gPad+gaugeR; // icon edge + gauge radius + padding + extra clearance
      const gcX=p.x+ux*gDist;
      const gcY=p.y+uy*gDist;
      // Horizontal row
      for(let li=0;li<3;li++){
        const gx=gcX+(li-1)*gaugeSpacing;
        const gy=gcY;
        svg+=drawGauge(gx,gy,gaugeR,ph.a[li],maxA,ph.v[li],'L'+(li+1),phaseColors[li]);
      }
    }
  });
  svg+=`</svg>`;
  return svg;
}

// Generate simulated 15-min day-ahead prices for the workspace country
function genPrices(cc){
  const base={EE:85,DE:92,NO:45,SE:52,FI:72,LV:88,LT:86,FR:78,NL:80}[cc]||80;
  const p=[];
  for(let h=0;h<24;h++)for(let m=0;m<60;m+=15){
    const peak=(h>=6&&h<=9)||(h>=17&&h<=20);
    const night=h>=0&&h<5;
    const v=base+(peak?Math.random()*200+60:night?Math.random()*30-40:Math.random()*80-10);
    p.push({h,m,v:Math.round(v*10)/10});
  }
  return p;
}

function buildTimelineChart(canvasId,assets,cc){
  const ctx=document.getElementById(canvasId);
  if(!ctx)return;
  const prices=genPrices(cc);
  const labels=prices.map(p=>String(p.h).padStart(2,'0')+':'+String(p.m).padStart(2,'0'));

  const assetMap={};

  // Market ribbon — colored bar at top showing which market is active
  const mktData=new Array(96).fill(null);
  const mktBg=new Array(96).fill('transparent');
  Object.values(assetMap).forEach(am=>{
    for(let i=0;i<96;i++){if(am.mkts[i]&&!mktData[i]){mktData[i]=1;mktBg[i]=(mktColors[am.mkts[i]]||'#888')+'44';}}
  });

  _charts[canvasId]=new Chart(ctx,{type:'bar',data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:true,position:'top',onHover:function(e){e.native.target.style.cursor='pointer'},onLeave:function(e){e.native.target.style.cursor='default'},labels:{boxWidth:8,font:{size:8,weight:'500'},padding:8,usePointStyle:true,pointStyle:'rect'}},
      tooltip:{callbacks:{label:c=>{
        if(c.dataset.label==='DA price (€/MWh)')return'Price: €'+c.parsed.y+'/MWh';
        if(c.dataset.label.includes(' ON')&&c.parsed.y!==null)return c.dataset.label.replace(' ON','')+' ON: '+Math.abs(c.parsed.y)+'kW';
        if(c.dataset.label.includes(' OFF')&&c.parsed.y!==null)return c.dataset.label.replace(' OFF','')+' OFF';
        if(c.parsed.y!==null&&!c.dataset.label.includes(' ON')&&!c.dataset.label.includes(' OFF')){
          const idx=c.dataIndex;const am=Object.values(assetMap).find(x=>x.id===c.dataset.label);
          const mkt=am?.mkts[idx]||'';return c.dataset.label+': '+Math.abs(c.parsed.y)+'kW'+(mkt?' — '+mkt:'');
        }return null;
      }}}},
    scales:{
      y:{position:'left',title:{display:true,text:'kW',font:{size:8,weight:'600'},color:'#a0a0a0'},ticks:{font:{size:8},color:'#a0a0a0'},grid:{color:'rgba(0,0,0,.04)'},stacked:true},
      y1:{position:'right',title:{display:true,text:'€/MWh',font:{size:8,weight:'600'},color:'#3a7bd5'},ticks:{font:{size:8},color:'#3a7bd5',callback:v=>'€'+v},grid:{drawOnChartArea:false}},
      x:{grid:{display:false},stacked:true,ticks:{font:{size:7,weight:'500'},color:'#6b6b6b',maxTicksLimit:16,maxRotation:0}}
    }
  }});
}

R.pooling=function(){
  const w=wd();
  if(!w._pools) w._pools=[
    {id:'pool1',name:'mFRR Balancing Pool',market:'mFRR',targetKw:1000,trader:w.sites[0]?.trader?.name||'Not assigned',assets:['GEN-001','BAT-001','HYD-001'],status:'active'},
    {id:'pool2',name:'FCR Reserve Pool',market:'FCR',targetKw:1000,trader:w.sites[0]?.trader?.name||'Not assigned',assets:['BAT-001','HYD-001','WND-001'],status:'active'}
  ];
  const pools=w._pools;
  const allAssets=w.sites.flatMap(s=>s.assets);

  // Market eligibility rules: which asset types can participate in each market
  const mktEligible={
    'mFRR':  {types:['genset','battery','hydro'],note:'≤ 15 min activation — gensets, batteries, hydro'},
    'aFRR':  {types:['battery','hydro','genset'],note:'≤ 5 min activation — batteries, hydro, fast gensets only',gensetNote:'Genset must have ≤5 min ramp time'},
    'FCR':   {types:['battery','hydro'],note:'≤ 30 sec activation — batteries and fast hydro only'},
    'FCR-D': {types:['battery'],note:'≤ 5 sec activation — batteries only'}
  };

  // Check if asset is eligible for a market
  function isEligible(assetType,market){
    const rule=mktEligible[market];
    if(!rule)return{ok:true,warn:''};
    if(!rule.types.includes(assetType)){
      const reasons={
        solar:'Solar has no controllable dispatch — production depends on weather',
        wind:'Wind has no controllable dispatch — production depends on weather',
        crypto:'Crypto miners are consumers, not frequency response providers',
        genset:market==='FCR'?'Genset ramp time too slow for FCR (needs ≤30 sec)':market==='FCR-D'?'Genset ramp time too slow for FCR-D (needs ≤5 sec)':'Not eligible for this market',
        hydro:market==='FCR-D'?'Hydro response too slow for FCR-D (needs ≤5 sec)':'Not eligible'
      };
      return{ok:false,warn:reasons[assetType]||assetType+' is not eligible for '+market};
    }
    // Special case: genset in aFRR needs fast ramp
    if(assetType==='genset'&&market==='aFRR')return{ok:true,warn:'Genset must have ≤5 min ramp time for aFRR prequalification'};
    return{ok:true,warn:''};
  }

  let h=`<div class="actions-bar"><div style="font-size:13px;font-weight:600;color:var(--tx)">Asset pooling — frequency market qualification</div><button class="btn pr" onclick="showCreatePool()">+ Create pool</button></div>`;

  h+=`<div class="fp" style="padding:14px 18px;margin-bottom:14px"><div style="font-size:11px;color:var(--tx2);line-height:1.7">
    Frequency markets (mFRR, aFRR, FCR) require a <strong>minimum of 1 MW</strong> of controllable capacity. Pooling allows combining multiple smaller assets to reach this threshold.<br><br>
    <strong>Rules:</strong> All assets in a pool must be operated by the <strong>same trader/aggregator</strong>. Assets on the same grid connection point (site) share one <strong>balance manager</strong> and <strong>cannot be split across different pools</strong> — if one asset from a site is in a pool, all other poolable assets from that site must join the same pool or remain unassigned.
  </div></div>`;

  // Existing pools
  pools.forEach((pool,pi)=>{
    const pAssets=pool.assets.map(aid=>allAssets.find(a=>a.id===aid)).filter(Boolean);
    const totalKw=pAssets.reduce((s,a)=>s+a.kw,0);
    const qualified=totalKw>=1000;
    const pct=Math.min(100,Math.round(totalKw/pool.targetKw*100));
    const statusCol=qualified?'var(--acc)':'var(--warn)';
    const hasIncompat=pAssets.some(a=>!isEligible(a.type,pool.market).ok);
    // Detect cross-pool site conflicts
    const otherPools=pools.filter((_,oi)=>oi!==pi);
    const poolSites=new Set(pAssets.map(a=>{const s=w.sites.find(s=>s.assets.some(x=>x.id===a.id));return s?.id;}).filter(Boolean));
    const hasCrossPool=pAssets.some(a=>{const s=w.sites.find(s=>s.assets.some(x=>x.id===a.id));if(!s)return false;return otherPools.some(op=>op.assets.some(aid=>s.assets.some(x=>x.id===aid)));});
    // Collect unique BRPs in pool
    const poolBRPs=[...new Set(pAssets.map(a=>{const s=w.sites.find(s=>s.assets.some(x=>x.id===a.id));return s?.balMgr?.name;}).filter(Boolean))];

    h+=`<div class="fp">
      <div class="fh"><h2>${pool.name}</h2><div style="display:flex;gap:6px;flex-wrap:wrap"><span class="pill ${qualified?'p-on':'p-mnt'}">${qualified?'Qualified':'Below 1 MW'}</span><span class="pill p-dk">${pool.market}</span>${hasIncompat?'<span class="pill p-flt">⚠ Incompatible</span>':''}${hasCrossPool?'<span class="pill" style="background:rgba(142,68,173,.1);color:#8e44ad">⚠ Cross-pool conflict</span>':''}</div></div>

      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px">
        <div style="text-align:center"><div style="font-size:9px;color:var(--tx3);text-transform:uppercase;font-weight:600;margin-bottom:2px">Total capacity</div><div style="font-size:18px;font-weight:700;color:${statusCol}">${totalKw>=1000?(totalKw/1000).toFixed(1)+' MW':totalKw+' kW'}</div></div>
        <div style="text-align:center"><div style="font-size:9px;color:var(--tx3);text-transform:uppercase;font-weight:600;margin-bottom:2px">Target</div><div style="font-size:18px;font-weight:700;color:var(--tx)">${pool.targetKw>=1000?(pool.targetKw/1000).toFixed(1)+' MW':pool.targetKw+' kW'}</div></div>
        <div style="text-align:center"><div style="font-size:9px;color:var(--tx3);text-transform:uppercase;font-weight:600;margin-bottom:2px">Assets / Sites</div><div style="font-size:18px;font-weight:700;color:var(--tx)">${pAssets.length} / ${poolSites.size}</div></div>
        <div style="text-align:center"><div style="font-size:9px;color:var(--tx3);text-transform:uppercase;font-weight:600;margin-bottom:2px">Trader</div><div style="font-size:12px;font-weight:600;color:var(--tx);margin-top:4px">${pool.trader}</div></div>
        <div style="text-align:center"><div style="font-size:9px;color:var(--tx3);text-transform:uppercase;font-weight:600;margin-bottom:2px">Balance mgr</div><div style="font-size:11px;font-weight:600;color:var(--tx);margin-top:4px">${poolBRPs.length===1?poolBRPs[0]:poolBRPs.length>1?poolBRPs.length+' BRPs':'—'}</div></div>
      </div>

      <div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:9px;color:var(--tx2)">Pool capacity vs 1 MW minimum</span><span style="font-size:9px;font-weight:600;color:${statusCol}">${pct}%</span></div>
      <div style="background:var(--cbg2);border-radius:4px;height:10px;overflow:hidden"><div style="height:100%;width:${Math.min(pct,100)}%;background:${statusCol};border-radius:4px;position:relative">${qualified?'<div style="position:absolute;right:0;top:0;bottom:0;width:2px;background:var(--accd)"></div>':''}</div></div>
      <div style="display:flex;justify-content:space-between;font-size:8px;color:var(--tx3);margin-top:2px"><span>0 kW</span><span style="color:var(--tx);font-weight:600">1 MW minimum</span><span>${pool.targetKw>=1000?(pool.targetKw/1000).toFixed(1)+' MW':pool.targetKw+' kW'}</span></div></div>

      ${mktEligible[pool.market]?`<div style="padding:8px 12px;background:rgba(58,123,213,.06);border:1px solid rgba(58,123,213,.15);border-radius:var(--rs);margin-bottom:12px;font-size:10px;color:#2471a3;display:flex;align-items:center;gap:6px"><span style="font-weight:700">ℹ</span> ${pool.market} eligibility: ${mktEligible[pool.market].note}</div>`:''}

      <div style="font-size:9px;font-weight:600;color:var(--tx3);text-transform:uppercase;margin-bottom:8px">Pooled assets</div>`;
    pAssets.forEach(a=>{
      const site=w.sites.find(s=>s.assets.some(x=>x.id===a.id));
      const elig=isEligible(a.type,pool.market);
      // Check if other assets from same site are in a DIFFERENT pool
      const siteAssetIds=site?site.assets.map(x=>x.id):[];
      const conflictPool=otherPools.find(op=>op.assets.some(aid=>siteAssetIds.includes(aid)));
      const hasConflict=!!conflictPool;
      const rowBg=hasConflict?'rgba(142,68,173,.06)':(!elig.ok?'rgba(201,60,60,.06)':(elig.warn?'rgba(230,126,34,.06)':'var(--cbg2)'));
      const rowBorder=hasConflict?'1px solid rgba(142,68,173,.25)':(!elig.ok?'1px solid rgba(201,60,60,.2)':(elig.warn?'1px solid rgba(230,126,34,.2)':'none'));
      h+=`<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 10px;background:${rowBg};border:${rowBorder};border-radius:var(--rs);margin-bottom:4px">
        ${AI(a.type,isAc(a.status),'sm')}
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px"><div style="font-size:11px;font-weight:600;color:var(--tx)">${a.id}</div>${!elig.ok?'<span class="pill p-flt" style="font-size:7px;padding:2px 6px">⚠ Not eligible</span>':elig.warn?'<span class="pill p-mnt" style="font-size:7px;padding:2px 6px">⚠ Check</span>':''}${hasConflict?'<span class="pill" style="font-size:7px;padding:2px 6px;background:rgba(142,68,173,.1);color:#8e44ad">⚠ Cross-pool</span>':''}</div>
          <div style="font-size:9px;color:var(--tx2)">${a.model} — ${site?.name||''} ${site?.eic?'('+site.eic+')':''}</div>
          ${site?.balMgr?`<div style="font-size:8px;color:var(--tx3);margin-top:1px">BRP: ${site.balMgr.name} — €${site.balMgr.price}/MWh</div>`:''}
          ${!elig.ok?`<div style="font-size:9px;color:var(--alr);margin-top:3px">⚠ ${elig.warn}</div>`:''}
          ${elig.warn&&elig.ok?`<div style="font-size:9px;color:var(--warn);margin-top:3px">⚠ ${elig.warn}</div>`:''}
          ${hasConflict?`<div style="font-size:9px;color:#8e44ad;margin-top:3px">⚠ Other assets from ${site?.name||'this site'} are in pool "${conflictPool.name}". All assets on one grid connection must be in the same pool.</div>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0"><div style="font-size:12px;font-weight:600;color:var(--tx)">${a.kw>=1000?(a.kw/1000).toFixed(1)+' MW':a.kw+' kW'}</div><div style="font-size:8px;color:var(--tx2)">${a.kwh?a.kwh.toLocaleString()+' kWh — ':''} ${a.type}</div></div>
        <button class="btn" style="font-size:8px;padding:3px 6px;color:var(--alr);border-color:var(--alr);flex-shrink:0" onclick="removeFromPool(${pi},'${a.id}')">✕</button>
      </div>`;
    });

    // Add asset dropdown — show eligibility + cross-pool conflict status
    const available=allAssets.filter(a=>!pool.assets.includes(a.id)&&isAc(a.status));
    if(available.length){
      h+=`<div style="margin-top:8px"><select id="pool-add-${pi}" style="font-size:10px;padding:6px 8px;border:1px solid var(--brd);border-radius:var(--rs);font-family:inherit;width:auto" onchange="addToPool(${pi},this.value);this.selectedIndex=0"><option value="">+ Add asset to pool...</option>`;
      available.forEach(a=>{
        const site=w.sites.find(s=>s.assets.some(x=>x.id===a.id));
        const elig=isEligible(a.type,pool.market);
        const siteIds=site?site.assets.map(x=>x.id):[];
        const inOther=otherPools.find(op=>op.assets.some(aid=>siteIds.includes(aid)));
        const blocked=!elig.ok||!!inOther;

window.addToPool=function(pi,aid){
  if(!aid)return;
  const w=wd();
  const pool=w._pools[pi];
  const allAssets=w.sites.flatMap(s=>s.assets);
  const asset=allAssets.find(a=>a.id===aid);
  if(!asset)return;

  // Market eligibility check
  const mktTypes={'mFRR':['genset','battery','hydro'],'aFRR':['battery','hydro','genset'],'FCR':['battery','hydro'],'FCR-D':['battery']};
  const allowed=mktTypes[pool.market];
  if(allowed&&!allowed.includes(asset.type)){
    const reasons={
      solar:'Solar panels have no controllable dispatch — production depends on irradiance and cannot be ramped on demand.',
      wind:'Wind turbines have no controllable dispatch — output depends on wind speed.',
      crypto:'Crypto miners are electricity consumers, not generators. They cannot provide frequency response to the grid.',
      genset:pool.market==='FCR'?'Gensets have ramp times of 10-30 seconds minimum, too slow for FCR which requires ≤30 sec full activation including synchronization.':pool.market==='FCR-D'?'Gensets cannot respond within 5 seconds required for FCR-D. Only batteries can achieve this response time.':'Not eligible.',
      hydro:'Hydro turbines cannot respond within 5 seconds required for FCR-D.'
    };
    alert('⚠ Cannot add '+asset.id+' ('+asset.type+') to '+pool.market+' pool:\n\n'+reasons[asset.type]);
    return;
  }

  // Cross-pool site conflict check: if any asset from the same site is in another pool, block it
  const site=w.sites.find(s=>s.assets.some(x=>x.id===aid));
  if(site){
    const siteAssetIds=site.assets.map(x=>x.id);
    const otherPools=w._pools.filter((_,i)=>i!==pi);
    const conflictPool=otherPools.find(op=>op.assets.some(a=>siteAssetIds.includes(a)));
    if(conflictPool){
      alert('⚠ Cannot add '+asset.id+' to "'+pool.name+'".\n\nAnother asset from '+site.name+' (EIC: '+(site.eic||'N/A')+') is already in pool "'+conflictPool.name+'".\n\nAll assets on the same grid connection point share one balance manager ('+(site.balMgr?.name||'unassigned')+') and must be in the same pool.');
      return;
    }
  }

  if(!pool.assets.includes(aid))pool.assets.push(aid);
  R.pooling();
};
window.removeFromPool=function(pi,aid){
  const pool=wd()._pools[pi];
  pool.assets=pool.assets.filter(x=>x!==aid);
  R.pooling();
};

    {d:'5 Mar 2026',t:'Multi-workspace & ENTSO-E zones',cat:'Product',b:'Create workspaces across 28 European countries with correct trading zones.',full:'Each workspace represents a legal entity in a specific ENTSO-E country. Countries with multiple bidding zones (Norway: 5, Sweden: 4, Italy: 6, Denmark: 2) show zone selection during workspace creation. Partner/trader services are filtered by country. Grid fees, tax rates, and TSO connections vary per workspace. The workspace selector in the sidebar allows instant switching between entities.'}

      {d:'11 Mar 2026',t:'Estonian wind power production hits record 48% of demand',cat:'Market',b:'Storm Helmi drives wind generation to 1.2 GW, covering nearly half of national consumption.',full:'During storm Helmi on March 10-11, Estonian wind farms generated a record 1.2 GW of power, covering 48% of national demand. Nord Pool day-ahead prices in the EE bidding zone dropped to -€15/MWh during the overnight hours, triggering activation of flexibility assets and crypto mining operations connected through platforms like GridTanker. The event demonstrates the growing importance of demand-side flexibility as renewable penetration increases.'},
      {d:'7 Mar 2026',t:'Elering opens mFRR capacity market for Q3 2026',cat:'Regulation',b:'TSO invites aggregators to bid for manual frequency restoration reserve contracts.',full:'Elering has opened the procurement process for mFRR capacity for Q3 2026 (July-September). Aggregators can submit bids for up-regulation capacity (minimum 1 MW) with delivery in the Estonian control area. The tender deadline is April 15, 2026. Eesti Energia Trading and KratTrade, both available as partner services on GridTanker, have confirmed participation. Asset owners with qualifying gensets and batteries connected through GridTanker are automatically eligible through their selected trader.'}

window.editUserAccess=function(ui){
  const w=wd(),u=w._users[ui];
  const isAdmin=u.role==='admin';
  let h=`<div style="font-size:11px;color:var(--acc);cursor:pointer;margin-bottom:12px;font-weight:500" onclick="nav('users')">← Back to users</div>`;
  h+=`<div style="display:flex;align-items:center;gap:12px;margin-bottom:20px"><div style="width:44px;height:44px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:#fff">${u.name.split(' ').map(n=>n[0]).join('')}</div><div><div style="font-size:18px;font-weight:600;color:var(--tx)">${u.name}</div><div style="font-size:11px;color:var(--tx2)">${u.email}</div></div></div>`;

  // Role selector
  h+=`<div class="fp"><div class="fh"><h2>Role</h2></div>`;
  ['admin','owner','viewer'].forEach(role=>{
    const sel=u.role===role;
    const desc={admin:'Full access to all sites, assets, settings, and user management.',owner:'Can manage assigned sites and their assets. Cannot change workspace settings.',viewer:'Read-only access to assigned sites and assets. Cannot modify anything.'}[role];
    h+=`<div style="border:1.5px solid ${sel?'var(--acc)':'var(--brd)'};border-radius:var(--rs);padding:12px 14px;margin-bottom:6px;cursor:pointer;${sel?'background:var(--accl)':''}" onclick="setUserRole(${ui},'${role}')">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:12px;font-weight:600;color:var(--tx)">${role[0].toUpperCase()+role.slice(1)}</div><div style="font-size:10px;color:var(--tx2);margin-top:2px">${desc}</div></div>
        ${sel?'<span class="pill p-on">Current</span>':''}
      </div></div>`;
  });
  h+=`</div>`;

  // Site access
  h+=`<div class="fp"><div class="fh"><h2>Site access</h2></div>`;
  if(isAdmin||u.role==='admin'){
    h+=`<div style="padding:12px;background:var(--cbg2);border-radius:var(--rs);font-size:11px;color:var(--tx2)">Admin role has access to all sites automatically.</div>`;
  } else {
    const allSites=u.sites==='all';
    h+=`<div style="margin-bottom:10px"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:11px;font-weight:500;color:var(--tx)"><input type="checkbox" ${allSites?'checked':''} onchange="toggleAllSites(${ui},this.checked)" style="accent-color:var(--acc)"> Grant access to all sites</label></div>`;
    if(!allSites){
      w.sites.forEach(s=>{
        const hasSite=u.sites.includes(s.id);
        h+=`<div style="border:1px solid ${hasSite?'var(--acc)':'var(--brd)'};border-radius:var(--rs);padding:10px 14px;margin-bottom:6px;${hasSite?'background:var(--accl)':''}">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" ${hasSite?'checked':''} onchange="toggleSiteAccess(${ui},'${s.id}',this.checked)" style="accent-color:var(--acc)">
            <div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--tx)">${s.name}</div><div style="font-size:9px;color:var(--tx2)">${s.loc} — ${s.assets.length} assets</div></div>
          </label>`;
        // Asset-level access within this site
        if(hasSite){
          const allAssets=u.assets==='all';
          h+=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--brd)"><div style="font-size:9px;font-weight:600;color:var(--tx3);text-transform:uppercase;margin-bottom:6px">Asset access</div>`;
          s.assets.forEach(a=>{
            const hasAsset=allAssets||u.assets.includes(a.id);
            h+=`<label style="display:flex;align-items:center;gap:6px;padding:4px 0;cursor:pointer;font-size:10px;color:var(--tx)">
              <input type="checkbox" ${hasAsset?'checked':''} onchange="toggleAssetAccess(${ui},'${a.id}',this.checked)" style="accent-color:var(--acc)">
              ${AI(a.type,isAc(a.status),'xs')}
              <span style="font-weight:500">${a.id}</span>
              <span style="color:var(--tx2);font-size:9px">${a.model} — ${a.kw>=1000?(a.kw/1000).toFixed(1)+' MW':a.kw+' kW'}</span>
            </label>`;
          });
          h+=`</div>`;
        }
        h+=`</div>`;
      });
    }
  }
  h+=`</div>`;

  // Actions
  h+=`<div style="display:flex;gap:8px;justify-content:space-between;margin-top:8px"><button class="btn" style="color:var(--alr);border-color:var(--alr)" onclick="if(confirm('Remove user?')){wd()._users.splice(${ui},1);nav('users')}">Remove user</button><button class="btn acc" onclick="nav('users')">Save & close</button></div>`;

  avEl.innerHTML=h;avEl.classList.remove('hidden');
};

window.setUserRole=function(ui,role){wd()._users[ui].role=role;if(role==='admin'){wd()._users[ui].sites='all';wd()._users[ui].assets='all';}editUserAccess(ui);};
window.toggleAllSites=function(ui,checked){const u=wd()._users[ui];u.sites=checked?'all':[];u.assets=checked?'all':[];editUserAccess(ui);};
window.toggleSiteAccess=function(ui,sid,checked){const u=wd()._users[ui];if(u.sites==='all')u.sites=wd().sites.map(s=>s.id);if(checked){if(!u.sites.includes(sid))u.sites.push(sid);const s=wd().sites.find(x=>x.id===sid);if(s&&u.assets!=='all'){s.assets.forEach(a=>{if(!u.assets.includes(a.id))u.assets.push(a.id)});}}else{u.sites=u.sites.filter(x=>x!==sid);if(u.assets!=='all'){const s=wd().sites.find(x=>x.id===sid);if(s)u.assets=u.assets.filter(aid=>!s.assets.some(a=>a.id===aid));}}editUserAccess(ui);};
window.toggleAssetAccess=function(ui,aid,checked){const u=wd()._users[ui];if(u.assets==='all')u.assets=wd().sites.flatMap(s=>s.assets.map(a=>a.id));if(checked){if(!u.assets.includes(aid))u.assets.push(aid);}else{u.assets=u.assets.filter(x=>x!==aid);}editUserAccess(ui);};

window.oA=function(si,ai){
  destroyCharts();
  const s=wd().sites[si],a=s.assets[ai],pm=periodMult[gPeriod],pRev=Math.round(a.rev*pm);
  const be=a.capex&&a.rev?{pct:Math.min(100,Math.round(a.rev/a.capex*100)),yl:Math.round(Math.max(0,(a.capex-a.rev)/(a.rev/3*12))*10)/10}:null;
  const isBat=a.type==='battery';const bat=a.bat||null;

  wizEl.innerHTML=`<div style="padding:28px 36px;max-width:560px;margin:0 auto">
    <div style="font-size:20px;font-weight:600;color:var(--tx);margin-bottom:4px">Add asset to ${s.name}</div>
    <p style="font-size:12px;color:var(--tx2);margin-bottom:24px;line-height:1.6">Register a new energy asset at this site.</p>
    <div class="wf"><label>Asset type</label>
      <select id="na-type">
        <option value="genset">Genset (diesel/gas generator)</option>
        <option value="battery">Battery (storage)</option>
        <option value="solar">Solar (PV panels)</option>
        <option value="wind">Wind (turbine)</option>
        <option value="hydro">Hydro (small hydro / run-of-river)</option>
        <option value="crypto">Crypto miner</option>
      </select>
    </div>
    <div class="wf"><label>Asset ID</label><input id="na-id" placeholder="e.g. GEN-003"></div>
    <div class="wf"><label>Model / Description</label><input id="na-model" placeholder="e.g. CAT C18"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="wf"><label>Capacity (kW)</label><input id="na-kw" type="number" placeholder="e.g. 1000"></div>
      <div class="wf"><label>Threshold (€/MWh)</label><input id="na-thr" type="number" value="350"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="wf"><label>CAPEX (€)</label><input id="na-capex" type="number" placeholder="e.g. 85000"></div>
      <div class="wf"><label>Initial status</label>
        <select id="na-status">
          <option value="pending">Pending (not yet active)</option>
          <option value="online">Online</option>
          <option value="maintenance">Maintenance</option>
        </select>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">
      <button class="btn" onclick="wizEl.classList.add('hidden')">Cancel</button>
      <button class="btn acc" onclick="createAsset(${si})">Create asset</button>
    </div>
  </div>`;
};

window.createAsset=function(si){
  const s=wd().sites[si];
  const type=document.getElementById('na-type').value;
  const id=document.getElementById('na-id').value||type.toUpperCase().substring(0,3)+'-'+String(s.assets.length+1).padStart(3,'0');
  const model=document.getElementById('na-model').value||'New asset';
  const kw=parseInt(document.getElementById('na-kw').value)||100;
  const thr=parseInt(document.getElementById('na-thr').value)||0;
  const capex=parseInt(document.getElementById('na-capex').value)||0;
  const status=document.getElementById('na-status').value;
  s.assets.push({id,type,model,kw,status,rev:0,avail:0,capex,threshold:thr,installed:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),sessions:[]});
  wizEl.classList.add('hidden');
  nav('sites');
};

// ── Rebuild workspace selector ──
function rebuildWSel(){
  let opts='';Object.keys(W).forEach(k=>{opts+=`<option value="${k}" ${k===cW?'selected':''}>${W[k].label}</option>`;});
  wSel.innerHTML=opts;
}

// ── Add Workspace Wizard ──
window.showAddWS=function(){
  wizEl.classList.remove('hidden');
  let countryOpts='';Object.keys(ENTSOE).sort((a,b)=>ENTSOE[a].name.localeCompare(ENTSOE[b].name)).forEach(cc=>{
    countryOpts+=`<option value="${cc}">${ENTSOE[cc].flag} ${ENTSOE[cc].name} — ${cc}</option>`;
  });
  wizEl.innerHTML=`<div style="padding:28px 36px;max-width:560px;margin:0 auto">
    <div style="font-size:20px;font-weight:600;color:var(--tx);margin-bottom:4px">Add workspace</div>
    <p style="font-size:12px;color:var(--tx2);margin-bottom:24px;line-height:1.6">Create a new workspace for a legal entity in an ENTSO-E country.</p>
    <div class="wf"><label>Company name</label><input id="nw-name" placeholder="e.g. Nordic Power AS"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="wf"><label>Company ID</label><input id="nw-reg" placeholder="e.g. 12345678"></div>
      <div class="wf"><label>VAT number</label><input id="nw-vat" placeholder="e.g. NO123456789MVA"></div>
    </div>
    <div class="wf"><label>Country</label><select id="nw-cc" onchange="updateZones();updatePartners()">${countryOpts}</select></div>
    <div class="wf"><label>Energy trading zone</label><select id="nw-zone"></select></div>
    <div style="background:var(--cbg2);border-radius:var(--rs);padding:12px;margin-bottom:14px">
      <div style="font-size:9px;font-weight:600;color:var(--tx3);text-transform:uppercase;margin-bottom:6px">Available partners in this region</div>
      <div id="nw-partners"></div>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:20px">
      <button class="btn" onclick="wizEl.classList.add('hidden')">Cancel</button>
      <button class="btn acc" onclick="createWS()">Create workspace</button>
    </div>
  </div>`;
  updateZones();updatePartners();
};

window.updateZones=function(){
  const cc=document.getElementById('nw-cc').value;
  const zones=ENTSOE[cc]?.zones||[cc];
  document.getElementById('nw-zone').innerHTML=zones.map(z=>`<option>${z}</option>`).join('');
};

window.updatePartners=function(){
  const cc=document.getElementById('nw-cc').value;
  const partners=getPartners(cc);
  document.getElementById('nw-partners').innerHTML=partners.map(p=>
    `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--brd)"><div style="width:28px;height:28px;border-radius:6px;background:var(--cbg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--acc);flex-shrink:0">${p.name.substring(0,2).toUpperCase()}</div><div><div style="font-size:11px;font-weight:600;color:var(--tx)">${p.name}</div><div style="font-size:9px;color:var(--tx2)">${p.desc}</div></div></div>`
  ).join('');
};

window.createWS=function(){
  const name=document.getElementById('nw-name').value||'New Company';
  const reg=document.getElementById('nw-reg').value||'';
  const vat=document.getElementById('nw-vat').value||'';
  const cc=document.getElementById('nw-cc').value;
  const zone=document.getElementById('nw-zone').value;
  const country=ENTSOE[cc]?.name||cc;
  const key='ws_'+Date.now();
  W[key]={label:`${name} — ${country}`,reg,vat,cc,zone,sites:[]};
  cW=key;
  wizEl.classList.add('hidden');
  rebuildWSel();nav('dashboard');
};

// ── Main nav ──
function nav(p) {
  cP=p; destroyCharts(); avEl.classList.add('hidden'); wizEl.classList.add('hidden');
  if(p!=='revenue') revSite='all';
  buildNav();
  ptEl.textContent=p[0].toUpperCase()+p.slice(1)+' — '+wd().label;
  if(R[p]) R[p]();
}

// ── Events ──
document.getElementById('lang').addEventListener('click',e=>{
  if(e.target.tagName==='SPAN'){document.querySelectorAll('#lang span').forEach(x=>x.classList.remove('on'));e.target.classList.add('on');nav(cP);}
});
wSel.addEventListener('change',()=>{cW=wSel.value;revSite='all';nav(cP);});

// ── Init ──
rebuildWSel();
nav('dashboard');
</script>
</body>
</html>
